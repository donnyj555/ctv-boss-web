[build]
  publish = "."
  functions = "netlify/functions"

[dev]
  port = 8899

# Proxy rules for the per-listing landing page on Railway. Order matters —
# Netlify processes top to bottom. Static-asset prefixes need to pass through
# unchanged BEFORE the catch-all rewrites /{slug} → /l/{slug}; otherwise CSS
# and JS bundles get the /l/ prefix appended and the landing page renders
# unstyled.

# Defensive: a bare /l URL (no slug after) shouldn't proxy to Railway
# with an empty splat. Browser autocomplete sometimes lands here when an
# agent tabs through previously-visited URLs. 301 redirect to the
# homepage so the bad URL doesn't dead-end.
[[redirects]]
  from = "/l"
  to = "/"
  status = 301
[[redirects]]
  from = "/l/"
  to = "/"
  status = 301

# Next.js bundle assets — CSS, JS chunks, fonts, image optimizer.
[[redirects]]
  from = "/_next/*"
  to = "https://realestate.ctvhomes.com/_next/:splat"
  status = 200
  force = true

# API routes (lead form submit lives here).
[[redirects]]
  from = "/api/*"
  to = "https://realestate.ctvhomes.com/api/:splat"
  status = 200
  force = true

# Catch-all for unknown paths only. force MUST stay false here so the
# marketing site's static files (homepage, /pricing, /plans, /blog, etc.)
# take precedence; only unmatched paths fall through to the proxy.
[[redirects]]
  from = "/*"
  to = "https://realestate.ctvhomes.com/l/:splat"
  status = 200
  force = false
