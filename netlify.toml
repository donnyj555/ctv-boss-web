[build]
  publish = "."
  functions = "netlify/functions"

[dev]
  port = 8899

# Catch-all proxy for per-listing landing pages on the Railway app.
# Duplicated from _redirects on purpose — both formats are supported and we
# hit a case where the _redirects file alone didn't seem to take effect.
# The toml form is processed identically by Netlify; having both is harmless
# and gives belt-and-suspenders coverage.
[[redirects]]
  from = "/*"
  to = "https://realestate.ctvhomes.com/l/:splat"
  status = 200
  # force=true makes this rule apply even when Netlify's file-matching
  # would otherwise serve a static file at the same path. We're using
  # this to debug a case where the rule wasn't firing at all — once
  # confirmed working, this can stay (no marketing page lives at a
  # digit-prefixed path, and the rule only matches non-file paths
  # anyway, so the "force" is belt-and-suspenders).
  force = true
